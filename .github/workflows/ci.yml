# CI skeleton — quality gates only, no deployment
# Triggers on PRs and pushes to main across Linux + macOS runners.
# Turborepo local cache is persisted via actions/cache on the .turbo directory.
name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Quality Gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 required for turborepo to correctly determine
          # which packages/tasks need to be rebuilt. Shallow clones break
          # turbo's cache key calculation and task graph.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      # Persist Turborepo local cache (.turbo) between runs.
      - name: Cache Turborepo artifacts
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/turbo.json', '**/tsconfig*.json', '**/eslint.config.*') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Post a commit status to satisfy branch protection rules that
      # expect legacy status contexts (not just check runs).
      - name: Report status
        if: always()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"${{ job.status == 'success' && 'success' || 'failure' }}\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"Quality Gates ${{ job.status }}\",\"context\":\"Quality Gates (ubuntu-latest)\"}"
